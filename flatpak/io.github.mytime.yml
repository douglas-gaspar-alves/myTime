app-id: io.github.mytime
runtime: org.kde.Platform
runtime-version: '6.9'
sdk: org.kde.Sdk
command: myTime

finish-args:
  - --share=ipc
  - --socket=x11
  - --socket=wayland
  - --device=dri
  - --socket=pulseaudio
  - --socket=session-bus
  - --talk-name=org.kde.StatusNotifierWatcher
  - --talk-name=org.freedesktop.DBus
  - --talk-name=org.kde.KGlobalSettings
  - --talk-name=org.kde.kconfig.notify

modules:
  - name: python3-deps
    buildsystem: simple
    build-commands:
      - pip3 install --prefix=/app --no-build-isolation --find-links=/run/build/python3-deps PySide6
    sources:
      - type: file
        path: wheels/shiboken6-6.11.1-cp310-abi3-manylinux_2_34_x86_64.whl
      - type: file
        path: wheels/pyside6_essentials-6.11.1-cp310-abi3-manylinux_2_34_x86_64.whl
      - type: file
        path: wheels/pyside6_addons-6.11.1-cp310-abi3-manylinux_2_34_x86_64.whl
      - type: file
        path: wheels/pyside6-6.11.1-cp310-abi3-manylinux_2_34_x86_64.whl

  - name: myTime
    buildsystem: simple
    build-commands:
      - mkdir -p /app/share/myTime /app/bin /app/share/applications /app/share/icons/hicolor/scalable/apps
      - cp -r . /app/share/myTime
      - install -m755 /app/share/myTime/data/entry.sh /app/bin/myTime
      - |
        cat > /app/share/applications/io.github.mytime.desktop << 'EOF'
        [Desktop Entry]
        Type=Application
        Name=myTime
        Comment=Gerenciador inteligente de Pomodoro e Jornadas
        Exec=myTime
        Icon=io.github.mytime
        Categories=Utility;Office;ProjectManagement;
        Terminal=false
        StartupNotify=true
        EOF
      - cp /app/share/myTime/data/icons/myTime.svg /app/share/icons/hicolor/scalable/apps/io.github.mytime.svg
    sources:
      - type: dir
        path: ../src/myTime
