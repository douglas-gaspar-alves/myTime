name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: false
        type: string

permissions:
  contents: write
  packages: write

env:
  FLATPAK_ID: io.github.mytime

jobs:
  # ============================================================
  # Build Flatpak
  # ============================================================
  build-flatpak:
    name: Build Flatpak
    runs-on: ubuntu-latest
    container:
      image: ubuntu:24.04
      options: --user root
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Flatpak & dependencies
        run: |
          apt-get update && apt-get install -y flatpak flatpak-builder wget
          flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          flatpak install -y flathub org.kde.Platform//6.11 org.kde.Sdk//6.11 org.flatpak.Builder

      - name: Build Flatpak
        run: |
          cd ${{ github.workspace }}
          ./scripts/build_flatpak.sh

      - name: Upload Flatpak artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.FLATPAK_ID }}.flatpak
          path: ${{ env.FLATPAK_ID }}.flatpak
          retention-days: 7

  # ============================================================
  # Build Python Wheel (for PyPI)
  # ============================================================
  build-wheel:
    name: Build Python Wheel
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build dependencies
        run: |
          pip install --upgrade pip build twine

      - name: Build wheel and sdist
        run: |
          python -m build --wheel --sdist

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-wheel
          path: dist/*.whl
          retention-days: 7

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-sdist
          path: dist/*.tar.gz
          retention-days: 7

  # ============================================================
  # Create GitHub Release with all artifacts
  # ============================================================
  release:
    name: Create Release
    needs: [build-flatpak, build-wheel]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: List artifacts
        run: |
          find artifacts -type f -name "*" | sort

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/**/*.flatpak
            artifacts/**/*.whl
            artifacts/**/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}