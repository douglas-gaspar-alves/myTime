<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="faceGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8f9fa"/>
      <stop offset="100%" stop-color="#e9ecef"/>
    </linearGradient>
  </defs>

  <!-- Outer ring -->
  <circle cx="64" cy="64" r="62" fill="#2c3e50" stroke="#1a252f" stroke-width="2"/>
  <circle cx="64" cy="64" r="60" fill="url(#faceGrad)" stroke="#34495e" stroke-width="1.5"/>

  <!-- Hour markers -->
  <g stroke="#2c3e50" stroke-width="3" stroke-linecap="round">
    <line x1="64" y1="8" x2="64" y2="18"/>
    <line x1="120" y1="64" x2="110" y2="64"/>
    <line x1="64" y1="120" x2="64" y2="110"/>
    <line x1="8" y1="64" x2="18" y2="64"/>
  </g>

  <!-- Tick marks for quarter positions -->
  <g stroke="#7f8c8d" stroke-width="1.5" stroke-linecap="round">
    <line x1="95" y1="33" x2="89" y2="39"/>
    <line x1="95" y1="95" x2="89" y2="89"/>
    <line x1="33" y1="95" x2="39" y2="89"/>
    <line x1="33" y1="33" x2="39" y2="39"/>
  </g>

  <!-- Hour hand (pointing to ~10) -->
  <line x1="64" y1="64" x2="44" y2="40" stroke="#e74c3c" stroke-width="5" stroke-linecap="round"/>
  <line x1="64" y1="64" x2="44" y2="40" stroke="#c0392b" stroke-width="2" stroke-linecap="round" opacity="0.3"/>

  <!-- Minute hand (pointing to ~2) -->
  <line x1="64" y1="64" x2="78" y2="34" stroke="#e74c3c" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Second hand (thin, pointing to ~7) -->
  <line x1="64" y1="74" x2="44" y2="82" stroke="#e74c3c" stroke-width="1" stroke-linecap="round"/>
  <circle cx="64" cy="64" r="2.5" fill="#e74c3c"/>

  <!-- Center pin -->
  <circle cx="64" cy="64" r="5" fill="#2c3e50"/>
  <circle cx="64" cy="64" r="3" fill="#ecf0f1"/>
</svg>
